version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (Dependabot updates the pin + the
  # version comment, and tells us when a new release lands).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # Python deps via uv (reads pyproject.toml + uv.lock).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
